<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Command Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d14;
      --surface: #14141e;
      --surface2: #1c1c28;
      --border:  #252535;
      --text:    #d0d0e0;
      --muted:   #55556a;
      --green:   #27ae60;
      --red:     #c0392b;
      --orange:  #e67e22;
      --blue:    #2980b9;
      --green-glow:  rgba(39,174,96,0.25);
      --red-glow:    rgba(192,57,43,0.30);
      --orange-glow: rgba(230,126,34,0.25);
    }

    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 12px;
    }

    /* ── connection badge ── */
    #conn {
      position: fixed;
      top: 14px;
      left: 14px;
      font-size: 0.68rem;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all 0.4s;
      z-index: 100;
    }
    #conn.ok  { color: var(--green); border-color: var(--green); }
    #conn.err { color: var(--red);   border-color: var(--red);   }

    /* ── header ── */
    header {
      text-align: center;
      padding-top: 4px;
    }
    header h1 {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── status card ── */
    #status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    #dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    #dot.listening  {
      background: var(--green);
      box-shadow: 0 0 0 4px var(--green-glow), 0 0 18px var(--green);
    }
    #dot.recording  {
      background: var(--red);
      box-shadow: 0 0 0 4px var(--red-glow), 0 0 22px var(--red);
      animation: pulse 0.75s ease-in-out infinite;
    }
    #dot.processing {
      background: var(--orange);
      box-shadow: 0 0 0 4px var(--orange-glow), 0 0 18px var(--orange);
      animation: blink 0.6s ease-in-out infinite;
    }
    #dot.idle { background: var(--border); box-shadow: none; }

    #status-label {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.45); opacity: 0.6; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ── info cards ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card-label {
      font-size: 0.66rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 0.97rem;
      min-height: 1.5em;
      word-break: break-word;
      transition: color 0.3s;
    }
    #heard-val       { color: #5dade2; }
    #transcribed-val { color: #2ecc71; }

    /* ── log ── */
    #log-wrap {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }
    .log-header {
      padding: 9px 14px;
      font-size: 0.66rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #clear-btn:hover { border-color: var(--text); color: var(--text); }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.79rem;
    }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .le {
      padding: 3px 7px;
      border-radius: 5px;
      animation: slide-in 0.12s ease;
      line-height: 1.55;
    }
    .le.success   { color: #2ecc71; background: rgba(46,204,113,0.07); }
    .le.trigger   { color: #f39c12; background: rgba(243,156,18,0.09); font-weight: 600; }
    .le.heard     { color: #5dade2; background: rgba(93,173,226,0.07); }
    .le.error     { color: #e74c3c; background: rgba(231,76,60,0.08); }
    .le.recording { color: #e74c3c; background: rgba(231,76,60,0.07); font-weight: 500; }
    .le.task      { color: #a29bfe; background: rgba(162,155,254,0.09); font-weight: 600; }
    .le.normal    { color: #888; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(4px); }
    }

    /* ── Web Speech panel ── */
    #ws-panel {
      background: var(--surface);
      border: 1px solid rgba(108,92,231,0.35);
      border-radius: 12px;
      padding: 14px 16px;
    }
    #ws-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    #ws-toggle {
      padding: 6px 18px;
      border-radius: 8px;
      border: 1px solid rgba(108,92,231,0.5);
      background: rgba(108,92,231,0.12);
      color: #a29bfe;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      font-family: inherit;
    }
    #ws-toggle:hover  { background: rgba(108,92,231,0.22); }
    #ws-toggle.active { background: rgba(231,76,60,0.15); border-color: #e74c3c; color: #e74c3c; }
    #ws-badge {
      font-size: 0.67rem;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all 0.3s;
      white-space: nowrap;
    }
    #ws-badge.on  { color: #a29bfe; border-color: #a29bfe; }
    #ws-badge.rec { color: var(--red); border-color: var(--red); }
    #ws-lang {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      margin-right: auto;
      font-family: inherit;
    }
    #ws-interim {
      font-size: 0.9rem;
      color: #a29bfe;
      min-height: 1.4em;
      opacity: 0.7;
      font-style: italic;
    }
    #ws-note {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <span id="conn">מחבר…</span>

  <header><h1>🎙 Voice Command Monitor</h1></header>

  <div id="status-card">
    <div id="dot" class="idle"></div>
    <span id="status-label">ממתין לחיבור…</span>
  </div>

  <!-- Web Speech API panel -->
  <div id="ws-panel">
    <div class="card-label" style="color:#a29bfe; margin-bottom:10px;">
      🌐 Web Speech API
      <span style="color:var(--muted); font-style:italic; font-size:0.6rem;">— Chrome / Edge בלבד</span>
    </div>
    <div id="ws-controls">
      <button id="ws-toggle" onclick="toggleWS()">▶ הפעל</button>
      <span id="ws-badge">כבוי</span>
      <select id="ws-lang">
        <option value="he-IL">🇮🇱 עברית</option>
        <option value="en-US">🇺🇸 English</option>
        <option value="ar-SA">🇸🇦 عربي</option>
      </select>
    </div>
    <div id="ws-interim">—</div>
    <div id="ws-note">פקודות ישירות ← ב-100ms | מילת הפעלה → מפעיל הקלטת Whisper</div>
  </div>

  <div class="row">
    <div class="card">
      <div class="card-label">שמעתי</div>
      <div class="card-value" id="heard-val">—</div>
    </div>
    <div class="card">
      <div class="card-label">תמלול אחרון</div>
      <div class="card-value" id="transcribed-val">—</div>
    </div>
  </div>

  <div class="card" style="border-color: rgba(162,155,254,0.35);">
    <div class="card-label" style="color:#a29bfe;">⚙️ משימה אחרונה</div>
    <div class="card-value" id="task-val" style="color:#a29bfe;">—</div>
  </div>

  <div id="log-wrap">
    <div class="log-header">
      <span>לוג אירועים</span>
      <button id="clear-btn" onclick="document.getElementById('log').innerHTML=''">נקה</button>
    </div>
    <div id="log"></div>
  </div>

  <script>
    const dot     = document.getElementById('dot');
    const lbl     = document.getElementById('status-label');
    const conn    = document.getElementById('conn');
    const logEl   = document.getElementById('log');
    const heardEl = document.getElementById('heard-val');
    const transEl = document.getElementById('transcribed-val');
    const taskEl  = document.getElementById('task-val');

    const LABELS = {
      listening:  '👂 מאזין לפקודה…',
      recording:  '🔴 מקליט',
      processing: '⚙️ מעבד…',
      idle:       '💤 לא פעיל',
    };

    function setState(s) {
      dot.className   = s;
      lbl.textContent = LABELS[s] || s;
    }

    function classify(msg) {
      if (msg.includes('🔴') || msg.includes('מקליט'))        return 'recording';
      if (msg.includes('🚀') || msg.includes('פקודה זוהתה')) return 'trigger';
      if (msg.includes('⚙️') || msg.includes('משימה'))        return 'task';
      if (msg.includes('✅'))                                 return 'success';
      if (msg.includes('🎤') || msg.includes('שמעתי'))        return 'heard';
      if (msg.includes('❌') || msg.includes('שגיאה'))         return 'error';
      return 'normal';
    }

    function addLog(ts, msg) {
      const el = document.createElement('div');
      el.className   = 'le ' + classify(msg);
      el.textContent = `[${ts}] ${msg}`;
      logEl.appendChild(el);
      while (logEl.children.length > 400) logEl.removeChild(logEl.firstChild);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function connect() {
      conn.textContent = 'מחבר…';
      conn.className   = '';
      // when served from the Python server, use same host:port
      const base = `${location.protocol}//${location.hostname}:${location.port || 8765}`;
      const es   = new EventSource(`${base}/events`);

      es.onopen = () => {
        conn.textContent = '● מחובר';
        conn.className   = 'ok';
      };

      es.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        if (ev.t === 'log') {
          addLog(ev.ts, ev.msg);
        } else if (ev.t === 'state') {
          setState(ev.state);
          if (ev.heard)       heardEl.textContent = ev.heard;
          if (ev.transcribed) transEl.textContent = ev.transcribed;
          if (ev.task)        taskEl.textContent  = ev.task;
        } else if (ev.t === 'heard') {
          heardEl.textContent = ev.text;
        } else if (ev.t === 'transcribed') {
          transEl.textContent = ev.text;
        } else if (ev.t === 'task') {
          taskEl.textContent = ev.text;
        }
      };

      es.onerror = () => {
        conn.textContent = '● מנותק — מחבר מחדש…';
        conn.className   = 'err';
        setState('idle');
        es.close();
        setTimeout(connect, 3000);
      };
    }

    // ── Web Speech API ──────────────────────────────────────────────────────
    let wsRecog  = null;
    let wsActive = false;

    function toggleWS() { wsActive ? stopWS() : startWS(); }

    function startWS() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        alert('הדפדפן אינו תומך ב-Web Speech API.\nהשתמש ב-Chrome או Edge.');
        return;
      }
      wsRecog = new SR();
      wsRecog.lang           = document.getElementById('ws-lang').value;
      wsRecog.continuous     = true;
      wsRecog.interimResults = true;

      const badge    = document.getElementById('ws-badge');
      const btn      = document.getElementById('ws-toggle');
      const interimEl = document.getElementById('ws-interim');

      wsRecog.onstart = () => {
        wsActive = true;
        badge.textContent = '🎙 מאזין';
        badge.className   = 'on';
        btn.textContent   = '■ עצור';
        btn.className     = 'active';
      };

      // auto-restart when browser ends the session (timeout etc.)
      wsRecog.onend = () => {
        if (wsActive) setTimeout(() => wsRecog && wsRecog.start(), 350);
      };

      wsRecog.onerror = (e) => {
        if (e.error === 'not-allowed') {
          alert('גישה למיקרופון נדחתה.\nאפשר הרשאה ב-Chrome ונסה שוב.');
          stopWS();
        }
        // 'no-speech' / 'audio-capture' — ignore, will auto-restart
      };

      wsRecog.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final  += e.results[i][0].transcript;
          else                      interim += e.results[i][0].transcript;
        }
        if (interim) interimEl.textContent = interim;
        if (final) {
          interimEl.textContent = '';
          badge.className = 'rec';
          const base = `${location.protocol}//${location.hostname}:${location.port || 8765}`;
          fetch(`${base}/command`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ text: final.trim(), source: 'webspeech' })
          })
          .then(r => r.json())
          .then(d => {
            badge.className = 'on';
            if (d.action === 'recording') {
              badge.textContent = '⏺ מקליט Whisper…';
              setTimeout(() => { if (wsActive) badge.textContent = '🎙 מאזין'; }, 4000);
            }
          })
          .catch(() => { badge.className = 'on'; });
        }
      };

      wsRecog.start();
    }

    function stopWS() {
      wsActive = false;
      const badge = document.getElementById('ws-badge');
      const btn   = document.getElementById('ws-toggle');
      badge.textContent = 'כבוי';
      badge.className   = '';
      btn.textContent   = '▶ הפעל';
      btn.className     = '';
      document.getElementById('ws-interim').textContent = '—';
      if (wsRecog) { wsRecog.stop(); wsRecog = null; }
    }

    // שינוי שפה תוך כדי פעולה
    document.getElementById('ws-lang').addEventListener('change', () => {
      if (wsActive) { stopWS(); setTimeout(startWS, 250); }
    });

    connect();
  </script>
</body>
</html>
